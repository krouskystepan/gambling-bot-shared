name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality checks
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Resolve package version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if version is already on npm
        id: npm
        run: |
          version="${{ steps.version.outputs.value }}"
          if npm view "gambling-bot-shared@${version}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "gambling-bot-shared@${version} is already on npm — nothing to publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish gambling-bot-shared@${version}."
          fi

      - name: Publish to npm
        if: steps.npm.outputs.skip != 'true'
        run: npm publish --access public
